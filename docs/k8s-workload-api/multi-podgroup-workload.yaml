apiVersion: scheduling.k8s.io/v1alpha1
kind: Workload
metadata:
  name: distributed-train
spec:
  podGroups:
    - name: driver
      policy:
        gang:
          minCount: 1
    - name: workers
      policy:
        gang:
          minCount: 4
---
apiVersion: v1
kind: Pod
metadata:
  name: driver
  labels:
    kai.scheduler/queue: default-queue
spec:
  schedulerName: kai-scheduler
  workloadRef:
    name: distributed-train
    podGroup: driver
  containers:
    - name: c
      image: busybox
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: worker-0
  labels:
    kai.scheduler/queue: default-queue
spec:
  schedulerName: kai-scheduler
  workloadRef:
    name: distributed-train
    podGroup: workers
    podGroupReplicaKey: "0"
  containers:
    - name: c
      image: busybox
      command: ["sleep", "3600"]
