apiVersion: scheduling.k8s.io/v1alpha1
kind: Workload
metadata:
  name: my-training
spec:
  podGroups:
    - name: workers
      policy:
        gang:
          minCount: 2
---
apiVersion: v1
kind: Pod
metadata:
  name: worker-0
  labels:
    kai.scheduler/queue: default-queue
spec:
  schedulerName: kai-scheduler
  workloadRef:
    name: my-training
    podGroup: workers
    podGroupReplicaKey: "0"
  containers:
    - name: c
      image: busybox
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: 100m
---
apiVersion: v1
kind: Pod
metadata:
  name: worker-1
  labels:
    kai.scheduler/queue: default-queue
spec:
  schedulerName: kai-scheduler
  workloadRef:
    name: my-training
    podGroup: workers
    podGroupReplicaKey: "0"
  containers:
    - name: c
      image: busybox
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: 100m
