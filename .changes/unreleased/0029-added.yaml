kind: Added
body: |-
  Exposed queue-controller descendent quota over-subscription enforcement through the supported install path: new `queuecontroller.limitDescendentsOverSubscription` Helm value and `spec.queueController.limitDescendentsOverSubscription` Config CR field (`none`/`warning`/`block`, default `none`), wired by the operator to the queue-controller. The queue validation webhook now emits admission warnings (`warning`) or rejects the request (`block`) when a child queue's quota exceeds its parent's quota or sibling quotas oversubscribe the parent. Replaces the manual-only `--enable-quota-validation` flag with `--limit-descendents-over-subscription`. [#1819](https://github.com/kai-scheduler/KAI-Scheduler/issues/1819)
