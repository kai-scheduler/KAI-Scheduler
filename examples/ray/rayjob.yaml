apiVersion: v1
kind: ConfigMap
metadata:
  name: rayjob-example-code
data:
  sample_code.py: |
    import ray

    ray.init()

    @ray.remote
    def square(value):
        return value * value

    print(ray.get([square.remote(value) for value in range(5)]))
---
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: rayjob-example
  labels:
    kai.scheduler/queue: default-queue
spec:
  entrypoint: python /home/ray/samples/sample_code.py
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 300
  rayClusterSpec:
    rayVersion: '2.46.0'
    headGroupSpec:
      rayStartParams: {}
      template:
        spec:
          schedulerName: kai-scheduler
          containers:
          - name: ray-head
            image: rayproject/ray:2.46.0
            volumeMounts:
            - name: rayjob-code
              mountPath: /home/ray/samples
            resources:
              limits:
                cpu: "1"
                nvidia.com/gpu: "1"
              requests:
                cpu: "200m"
                memory: "256Mi"
          volumes:
          - name: rayjob-code
            configMap:
              name: rayjob-example-code
              items:
              - key: sample_code.py
                path: sample_code.py
    workerGroupSpecs:
    - replicas: 2
      minReplicas: 1
      maxReplicas: 5
      groupName: gpu-workers
      rayStartParams: {}
      template:
        spec:
          schedulerName: kai-scheduler
          containers:
          - name: ray-worker
            image: rayproject/ray:2.46.0
            resources:
              limits:
                cpu: "1"
                nvidia.com/gpu: "1"
              requests:
                cpu: "200m"
                memory: "256Mi"
