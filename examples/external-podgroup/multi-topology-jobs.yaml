---
apiVersion: kai.scheduler/v1alpha1
kind: Topology
metadata:
  name: rack-topology
spec:
  levels:
    - nodeLabel: topology.test/rack-domain
    - nodeLabel: kubernetes.io/hostname

---
apiVersion: kai.scheduler/v1alpha1
kind: Topology
metadata:
  name: zone-topology
spec:
  levels:
    - nodeLabel: topology.test/zone-domain
    - nodeLabel: kubernetes.io/hostname

---
apiVersion: scheduling.run.ai/v2alpha2
kind: PodGroup
metadata:
  name: multi-topology-pipeline
  namespace: default
  labels:
    kai.scheduler/queue: default-queue
spec:
  queue: default-queue
  minSubGroup: 2
  subGroups:
    - name: rack-workers
      minMember: 3
      topologyConstraint:
        topology: rack-topology
        requiredTopologyLevel: topology.test/rack-domain
    - name: zone-workers
      minMember: 3
      topologyConstraint:
        topology: zone-topology
        requiredTopologyLevel: topology.test/zone-domain

---
apiVersion: batch/v1
kind: Job
metadata:
  name: rack-bound-job
  namespace: default
  annotations:
    kai.scheduler/skip-podgrouper: "true"
spec:
  parallelism: 3
  completions: 3
  template:
    metadata:
      annotations:
        pod-group-name: multi-topology-pipeline
      labels:
        kai.scheduler/queue: default-queue
        kai.scheduler/subgroup-name: rack-workers
    spec:
      schedulerName: kai-scheduler
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "250m"
              nvidia.com/gpu: "4"
            limits:
              cpu: "250m"
              nvidia.com/gpu: "4"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: zone-bound-job
  namespace: default
  annotations:
    kai.scheduler/skip-podgrouper: "true"
spec:
  parallelism: 3
  completions: 3
  template:
    metadata:
      annotations:
        pod-group-name: multi-topology-pipeline
      labels:
        kai.scheduler/queue: default-queue
        kai.scheduler/subgroup-name: zone-workers
    spec:
      schedulerName: kai-scheduler
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "250m"
              nvidia.com/gpu: "4"
            limits:
              cpu: "250m"
              nvidia.com/gpu: "4"
