suite: scheduler podDisruptionBudget in kai-config

set:
  kaiConfigDeployer:
    enabled: false
  kaiConfig:
    render: true

templates:
  - kai-config.yaml
tests:
  - it: renders scheduler podDisruptionBudget from values
    set:
      scheduler.podDisruptionBudget:
        enabled: true
        maxUnavailable: 1
    asserts:
      - equal:
          path: spec.scheduler.service.podDisruptionBudget.enabled
          value: true
      - equal:
          path: spec.scheduler.service.podDisruptionBudget.maxUnavailable
          value: 1

  - it: renders disabled PDB without maxUnavailable when only enabled is set in test values
    set:
      scheduler.podDisruptionBudget:
        enabled: false
    asserts:
      - equal:
          path: spec.scheduler.service.podDisruptionBudget.enabled
          value: false

  - it: omits podDisruptionBudget when the values map is absent
    set:
      scheduler.podDisruptionBudget: null
    asserts:
      - isNull:
          path: spec.scheduler.service.podDisruptionBudget
