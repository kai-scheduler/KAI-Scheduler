apiVersion: batch/v1
kind: Job
metadata:
  name: kai-config-deleter
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-delete
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: kai-config-deleter
    spec:
      serviceAccountName: kai-config-deployer
      restartPolicy: OnFailure
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.global.affinity }}
      affinity:
        {{- toYaml .Values.global.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.global.tolerations }}
      tolerations:
        {{- toYaml .Values.global.tolerations | nindent 8 }}
      {{- end }}
      containers:
      - name: deleter
        image: "{{ .Values.global.registry }}/{{ .Values.crdupgrader.image.name }}:{{ .Values.crdupgrader.image.tag | default .Values.global.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.crdupgrader.image.pullPolicy }}
        {{- if .Values.global.securityContext }}
        securityContext:
          {{- toYaml .Values.global.securityContext | nindent 10 }}
        {{- end }}
        command:
        - /bin/bash
        - -c
        args:
        - kubectl delete config kai-config --ignore-not-found
