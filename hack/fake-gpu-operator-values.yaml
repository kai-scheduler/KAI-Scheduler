topology:
  # nodePools is a map of node pool name to node pool configuration.
  # Nodes are assigned to node pools based on the node pool label's value (key is configurable via nodePoolLabelKey).
  # default kind layout labels every GPU worker "default"; the "numa-full"
  # layout (nightly) also populates numa-single/numa-besteffort.
  nodePools:
    default:
      gpu:
        backend: fake
        overrides:
          device_defaults:
            name: Tesla-K80
            memory:
              total_bytes: 11996758016   # 11441 MiB
          devices: [ {}, {}, {}, {}, {}, {}, {}, {} ]
      numa:
        zones: 2
        topologyManagerPolicy: restricted
        cpuPerZone: "1"
        memPerZone: 2Gi
        distances:
          self: 10
          remote: 21
    # single-numa-node & best-effort pools are only populated by the numa-full kind
    # layout (nightly); on the default layout no node carries their label, so they
    # publish no NRTs.
    numa-single:
      gpu:
        backend: fake
        overrides:
          device_defaults:
            name: Tesla-K80
            memory:
              total_bytes: 11996758016   # 11441 MiB
          devices: [ {}, {}, {}, {}, {}, {}, {}, {} ]
      numa:
        zones: 2
        topologyManagerPolicy: single-numa-node
        cpuPerZone: "1"
        memPerZone: 2Gi
        distances:
          self: 10
          remote: 21
    numa-besteffort:
      gpu:
        backend: fake
        overrides:
          device_defaults:
            name: Tesla-K80
            memory:
              total_bytes: 11996758016   # 11441 MiB
          devices: [ {}, {}, {}, {}, {}, {}, {}, {} ]
      numa:
        zones: 2
        topologyManagerPolicy: best-effort
        cpuPerZone: "1"
        memPerZone: 2Gi
        distances:
          self: 10
          remote: 21
  nodePoolLabelKey: run.ai/simulated-gpu-node-pool

environment:
  resourceReservationNamespace: kai-resource-reservation

statusUpdater:
  disableNodeLabeling: true

statusExporter:
  nodeResourceTopology:
    enabled: true
    installCRD: true
  podResources:
    enabled: true
draPlugin:
  enabled: true
