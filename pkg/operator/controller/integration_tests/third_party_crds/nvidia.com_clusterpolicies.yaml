# Trimmed mirror of the upstream nvidia.com/v1 ClusterPolicy CRD.
# Contains only the fields used by KAI-scheduler (operator, cdi).
# The upstream CRD is not imported directly to avoid CVE-scanner issues
# with its CalVer release tags (see third_party/nvidia/gpu-operator/api/nvidia/v1/types.go).
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: clusterpolicies.nvidia.com
spec:
  group: nvidia.com
  names:
    kind: ClusterPolicy
    listKind: ClusterPolicyList
    plural: clusterpolicies
    singular: clusterpolicy
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.state
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: ClusterPolicy is the Schema for the clusterpolicies API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Cannot be updated. In CamelCase.
            type: string
          metadata:
            type: object
          spec:
            description: ClusterPolicySpec defines the desired state of ClusterPolicy
            properties:
              operator:
                description: Operator component spec
                properties:
                  defaultRuntime:
                    description: Runtime describes the container runtime used on the nodes
                    type: string
                required:
                - defaultRuntime
                type: object
              cdi:
                description: CDI configures how the Container Device Interface is used in the cluster
                properties:
                  default:
                    default: false
                    description: Default indicates whether to use CDI as the default mechanism for providing GPU access to containers.
                    type: boolean
                  enabled:
                    default: false
                    description: Enabled indicates whether CDI can be used to make GPUs accessible to containers.
                    type: boolean
                type: object
            required:
            - operator
            type: object
          status:
            description: ClusterPolicyStatus defines the observed state of ClusterPolicy
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
